version: "3"
services:
  docker-exporter:
    build: ./docker-metrics-exporter
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  flask-app:
    build: ./flask-server
    ports:
      - "8081:8080"
  # produces external metrics about the host machine, such as CPU and memory usage
  # is this exporting metrics about the docker container or about the host machine?
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/config.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    depends_on:
      - flask-app
      - docker-exporter
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana
    container_name: grafana
    volumes:
      - ./grafana/grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    user: "0"
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    restart: unless-stopped
