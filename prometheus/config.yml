# tutorial taken from: 
# https://oneuptime.com/blog/post/2026-01-25-monitor-docker-prometheus/view

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape docker-exporter for all the container metrics
  - job_name: 'docker-exporter'
    static_configs:
      - targets: ['docker-exporter:8000']

  # Scrape the Flask application metrics exposed at /metrics.
  - job_name: 'flask-app'
    metrics_path: /metrics
    static_configs:
      - targets: ['flask-app:8080']

  # Scrape Prometheus itself - why? isn't it included in the container metrics?
